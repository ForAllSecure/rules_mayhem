on:
  release:
      types: [published]
  # In case of problems, let release engineers retry by manually dispatching
  # the workflow from the GitHub UI
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
  
  jobs:
    publish:
      uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1
      with:
        tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
        # GitHub repository which is a fork of the upstream where the Pull Request will be opened.
        registry_fork: ForAllSecure/bazel-central-registry
        # see note on Attestation Support
        attest: false
      permissions:
        contents: write
        # Necessary if attest:true
        # id-token: write
        # Necessary if attest:true
        # attestations: write
      secrets:
        # Necessary to push to the BCR fork, and to open a pull request against a registry
        publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}